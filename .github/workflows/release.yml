name: Release

# Publishes packages/cli to npm when a GitHub release is published.
# Uses npm trusted publishing (OIDC) with provenance — no npm token is stored
# in this repository. Configure the trusted publisher on npmjs.com:
# package "ccusage-hub" -> Settings -> Trusted publisher ->
# GitHub Actions, repo dannyball710/ccusage-hub, workflow release.yml.

on:
  release:
    types: [published]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Ensure npm supports trusted publishing (>= 11.5.1)
        run: npm install -g npm@latest

      - name: Verify release tag matches package version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          PKG_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG" != "v$PKG_VERSION" ]; then
            echo "Release tag $TAG does not match packages/cli version $PKG_VERSION" >&2
            exit 1
          fi

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter ccusage-hub build

      - name: Publish to npm with provenance
        working-directory: packages/cli
        run: npm publish --provenance --access public
